<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Leaderboard</title>
</head>
<body>
  <h1>Leaderboard</h1>
  <ol id="list"></ol>

  <script>
    const API_BASE = "https://frogjump-leaderboard.onrender.com";

    async function load() {
      const res = await fetch(`${API_BASE}/leaderboard?limit=10`);
      const data = await res.json();

      const ol = document.getElementById("list");
      ol.innerHTML = "";

      data.forEach((r, i) => {
        const li = document.createElement("li");
        li.textContent =
          `${i + 1}. ${r.nickname} - ${r.score} (${r.created_at})`;
        ol.appendChild(li);
      });
    }

    load();
    setInterval(load, 2000); // 2초마다 갱신
  </script>
</body>
</html>
